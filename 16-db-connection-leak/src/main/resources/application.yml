spring:
  application:
    name: m16-db-connection-leak

  datasource:
    url: jdbc:postgresql://localhost:5432/appdb?currentSchema=m16_leak
    username: appuser
    password: AppUser123
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: m16-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000          # ms — fail fast when leaked-out
      idle-timeout: 60000               # ms
      max-lifetime: 600000              # ms
      # THE knob this module is about. After 4s of holding a connection
      # without returning it, Hikari logs "Apparent connection leak
      # detected" with a STACK TRACE of where it was borrowed. Set this
      # ABOVE your slowest legitimate operation, but as low as you can
      # stand. 5s–30s is the typical band.
      leak-detection-threshold: 4000
      register-mbeans: true             # enable HikariPoolMXBean

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8216

logging:
  level:
    com.claude.dbpoc.m16: INFO
    # Hikari prints the leak warning at WARN by default. Make sure the
    # logger that produces it is not silenced anywhere upstream.
    com.zaxxer.hikari: INFO
    com.zaxxer.hikari.pool.ProxyLeakTask: WARN
