spring:
  application:
    name: m27-db-cqrs

  datasource:
    url: jdbc:postgresql://localhost:5432/appdb?currentSchema=m27_cqrs
    username: appuser
    password: AppUser123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      pool-name: m27-pool

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: 8227

logging:
  level:
    com.claude.dbpoc.m27: INFO

cqrs:
  outbox:
    batch-size: 100
    poll-interval-ms: 1000
