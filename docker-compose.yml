name: db-poc

# Profiles
#   core         -> Postgres + Oracle
#   postgres     -> Postgres only (lighter, ~30s to start)
#   oracle       -> Oracle 23ai Free only (~3 min first start)
#   observability -> + Prometheus + Grafana

services:

  # --------------------------------------------------------------------------
  # Postgres 16 with pg_stat_statements + auto_explain pre-loaded
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    profiles: ["core", "postgres"]
    container_name: db-poc-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: AppUser123
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements,auto_explain
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=10000
      -c auto_explain.log_min_duration=200ms
      -c auto_explain.log_analyze=on
      -c auto_explain.log_buffers=on
      -c auto_explain.log_timing=on
      -c log_min_duration_statement=200
      -c track_io_timing=on
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  # --------------------------------------------------------------------------
  # Oracle 23ai Free — matches the user's prod stack
  # --------------------------------------------------------------------------
  oracle:
    image: container-registry.oracle.com/database/free:23.5.0.0
    profiles: ["core", "oracle"]
    container_name: db-poc-oracle
    environment:
      ORACLE_PWD: AppUser123
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - oradata:/opt/oracle/oradata
      - ./docker/oracle-init.sql:/opt/oracle/scripts/startup/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM dual;' | sqlplus -s sys/AppUser123@FREEPDB1 as sysdba | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s

  # --------------------------------------------------------------------------
  # Redis — distributed cache for m25 (and any other module that needs one).
  # Activate with:  docker compose --profile redis up -d
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    profiles: ["core", "redis"]
    container_name: db-poc-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------------
  # Citus — distributed Postgres extension for m24. One coordinator + 2 workers.
  # Activate with:  docker compose --profile citus up -d
  # The coordinator listens on 5433 (so it doesn't collide with the m01-m23
  # Postgres on 5432). Workers are reachable via the coordinator.
  # --------------------------------------------------------------------------
  citus-coordinator:
    image: citusdata/citus:12.1
    profiles: ["citus"]
    container_name: db-poc-citus-coordinator
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: AppUser123
      POSTGRES_DB: appdb
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - citus-coordinator-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  citus-worker-1:
    image: citusdata/citus:12.1
    profiles: ["citus"]
    container_name: db-poc-citus-worker-1
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: AppUser123
      POSTGRES_DB: appdb
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - citus-worker-1-data:/var/lib/postgresql/data

  citus-worker-2:
    image: citusdata/citus:12.1
    profiles: ["citus"]
    container_name: db-poc-citus-worker-2
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: AppUser123
      POSTGRES_DB: appdb
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - citus-worker-2-data:/var/lib/postgresql/data

  # --------------------------------------------------------------------------
  # Observability — every diagnostic POC needs this
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    container_name: db-poc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["observability"]
    container_name: db-poc-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    profiles: ["observability"]
    container_name: db-poc-pg-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://appuser:AppUser123@postgres:5432/appdb?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres

volumes:
  pgdata:
  oradata:
  citus-coordinator-data:
  citus-worker-1-data:
  citus-worker-2-data:
